{% extends "layout/base.html" %}

{% block content %}

<div class="topbar">

    <div>

        <h1>
            Change Password
        </h1>

        <p>
            Update your account password
        </p>

    </div>

</div>

<div class="card">

    <form method="POST">

        <div class="form-group">

            <label>
                Current Password
            </label>

            <input
            type="password"
            name="current_password"
            required>

        </div>

        <div class="form-group">

            <label>
                New Password
            </label>

            <input
            type="password"
            name="new_password"
            required>

        </div>

        <div class="form-group">

            <label>
                Confirm Password
            </label>

            <input
            type="password"
            name="confirm_password"
            required>

        </div>

        <button
        type="submit"
        class="btn-primary">

            Update Password

        </button>

    </form>

</div>

{% endblock %}
