{% extends "layout/base.html" %}

{% block content %}

<div class="topbar">

    <div>

        <h1>
            Edit Profile
        </h1>

        <p>
            Update your personal information
        </p>

    </div>

</div>

<div class="card">

    <div class="card-header">

        <h3>
            Profile Details
        </h3>

    </div>

    <form method="POST">

        <div class="form-group">

            <label>
                Full Name
            </label>

            <input
            type="text"
            name="full_name"
            value="{{ current_user.full_name }}"
            required>

        </div>

        <div class="form-group">

            <label>
                Email
            </label>

            <input
            type="email"
            name="email"
            value="{{ current_user.email }}"
            required>

        </div>

        <button
        type="submit"
        class="btn-primary">

            Save Changes

        </button>

    </form>

</div>

{% endblock %}
