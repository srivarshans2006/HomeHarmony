{% extends "layout/base.html" %}

{% block content %}

<div class="topbar">

    <div>

        <h1>
            Edit Shopping Item
        </h1>

        <p>
            Update the details of an existing shopping item
        </p>

    </div>

</div>

<div class="card">

    <div class="card-header">

        <h3>
            Shopping Item Details
        </h3>

    </div>

    <form method="POST">

        <div class="task-form">

            <div class="form-group">

                <label>
                    Item Name
                </label>
                 <input
                    type="text"
                    name="item_name"
                    value="{{ item.item_name }}"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Quantity
                </label>

               <input
                type="text"
                name="quantity"
                value="{{ item.quantity }}"
                required>

            </div>

            <div class="task-actions">

                <a
                href="/shopping"
                class="cancel-btn">

                    Cancel

                </a>

                <button
                type="submit"
                class="create-btn">

                    Save Changes

                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
