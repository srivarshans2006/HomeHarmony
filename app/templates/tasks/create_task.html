{% extends "layout/base.html" %}

{% block content %}

<div class="topbar">

    <div>

        <h1>
            Create Task
        </h1>

        <p>
            Create and assign household tasks
        </p>

    </div>

</div>

<div class="card">

    <div class="card-header">

        <h3>
            Task Information
        </h3>

    </div>

    <form method="POST">

        <div class="task-form">

            <div class="form-group">

                <label>
                    Task Title
                </label>

                <input
                    type="text"
                    name="title"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Description
                </label>

                <textarea
                    name="description">
                </textarea>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label>
                        Assign To
                    </label>

                    <select
                        name="assigned_to">

                        {% for member in members %}

                        <option
                            value="{{ member.id }}">

                            {{ member.full_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Priority
                    </label>

                    <select
                        name="priority">

                        <option>
                            Low
                        </option>

                        <option selected>
                            Medium
                        </option>

                        <option>
                            High
                        </option>

                    </select>

                </div>

            </div>

            <div class="task-actions">

                <a
                    href="/tasks"
                    class="cancel-btn">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="create-btn">

                    Create Task

                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
