{% extends "layout/base.html" %}

{% block content %}

<div class="topbar">

    <div>

        <h1>
            Tasks
        </h1>

        <p>
            Manage household tasks
        </p>

    </div>

    <a
        href="/create-task"
        class="btn-primary">

        + Create Task

    </a>

</div>

<div class="card">

    <div class="card-header">

        <h3>
            All Tasks
        </h3>

    </div>

    {% if tasks %}
         {% for task in tasks %}

<div class="task-item">
<div>

    <h4>
        {{ task.title }}
    </h4>

    <p>
        {{ task.description }}
    </p>

</div>

<div class="task-actions">

    <form
    action="{{ url_for('tasks.update_task_status', task_id=task.id) }}"
    method="POST">

        <select
        name="status"
        class="status-select

        {% if task.status == 'Pending' %}
            pending-status
        {% elif task.status == 'In Progress' %}
            progress-status
        {% else %}
            completed-status
        {% endif %}"

        onchange="this.form.submit()">

            <option
            value="Pending"

            {% if task.status == "Pending" %}
            selected
            {% endif %}>

                Pending

            </option>

            <option
            value="In Progress"

            {% if task.status == "In Progress" %}
            selected
            {% endif %}>

                In Progress

            </option>

            <option
            value="Completed"

            {% if task.status == "Completed" %}
            selected
            {% endif %}>

                Completed

            </option>

        </select>

    </form>
    <a
href="{{ url_for('tasks.edit_task',
task_id=task.id) }}"
class="edit-btn">

Edit

</a>

    <a
    href="{{ url_for('tasks.delete_task', task_id=task.id) }}"
    class="delete-btn"

    onclick="return confirm('Are you sure you want to delete this task?')">

        Delete

    </a>

</div>


</div>

{% endfor %}

       

        

    {% else %}

        <p>
            No tasks created yet.
        </p>

    {% endif %}

</div>

{% endblock %}
