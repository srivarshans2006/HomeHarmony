<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Select Household</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Poppins",sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );
        }

        .container{

            width:900px;

            background:white;

            border-radius:24px;

            padding:50px;

            box-shadow:
            0 20px 50px rgba(0,0,0,.15);

            text-align:center;
        }

        h1{
            color:#111827;
            margin-bottom:10px;
        }

        p{
            color:#6b7280;
            margin-bottom:40px;
        }

        .options{

            display:flex;
            gap:30px;
            justify-content:center;
        }

        .card{

            flex:1;

            padding:40px;

            border:2px solid #e5e7eb;

            border-radius:20px;

            transition:.3s;
        }

        .card:hover{

            transform:translateY(-5px);

            border-color:#6366f1;
        }

        .card h2{

            margin-bottom:15px;
            color:#111827;
        }

        .card p{

            margin-bottom:25px;
        }

        .btn{

            display:inline-block;

            text-decoration:none;

            padding:14px 28px;

            border-radius:12px;

            background:
            linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );

            color:white;

            font-weight:600;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>
            Welcome to HomeHarmony
        </h1>

        <p>
            Choose how you want to get started
        </p>

        <div class="options">

            <div class="card">

                <h2>
                    Create Household
                </h2>

                <p>
                    Start a new household and invite family members.
                </p>

                <a
                    href="/create-household"
                    class="btn">

                    Create

                </a>

            </div>

            <div class="card">

                <h2>
                    Join Household
                </h2>

                <p>
                    Join an existing household using an invite code.
                </p>

                <a
                    href="/join-household"
                    class="btn">

                    Join

                </a>

            </div>

        </div>

    </div>

</body>

</html>
