<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Household</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            font-family: "Poppins", sans-serif;
        }

        body{
            width: 100%;
            height: 100vh;

            background:
            linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .create-card{
            width: 450px;

            background: white;

            padding: 45px;

            border-radius: 24px;

            box-shadow:
            0 10px 40px rgba(0,0,0,0.15);
        }

        h1{
            color: #111827;

            margin-bottom: 10px;
        }

        p{
            color: #6b7280;

            margin-bottom: 30px;
        }

        .input-group{
            margin-bottom: 25px;
        }

        label{
            display: block;

            margin-bottom: 10px;

            font-size: 14px;

            font-weight: 500;
        }

        input{
            width: 100%;

            padding: 15px;

            border-radius: 14px;

            border: 1px solid #d1d5db;

            outline: none;

            font-size: 15px;
        }

        input:focus{
            border-color: #4f46e5;
        }

        button{
            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 14px;

            background:
            linear-gradient(
                135deg,
                #4f46e5,
                #7c3aed
            );

            color: white;

            font-size: 15px;

            font-weight: 600;

            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="create-card">

        <h1>
            Create Household
        </h1>

        <p>
            Create a collaborative household workspace
        </p>

        <form method="POST">

            <div class="input-group">

                <label>
                    Household Name
                </label>

                <input
                    type="text"
                    name="household_name"
                    placeholder="Enter household name">

            </div>

            <button type="submit">

                Create Household

            </button>

        </form>

    </div>

</body>

</html>
