{% extends "layout/base.html" %}

{% block content %}

<div class="topbar">

    <div>

        <h1>
            Create Expense
        </h1>

        <p>
            Add and track household expenses
        </p>

    </div>

</div>

<div class="card">

    <div class="card-header">

        <h3>
            Expense Information
        </h3>

    </div>

    <form method="POST">

        <div class="task-form">

            <div class="form-group">

                <label>
                    Expense Title
                </label>

                <input
                    type="text"
                    name="title"
                    placeholder="Enter expense title"
                    required>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label>
                        Amount (₹)
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="amount"
                        placeholder="Enter amount"
                        required>

                </div>

                <div class="form-group">

                    <label>
                        Category
                    </label>

                    <select name="category">

                        <option value="Food">
                            Food
                        </option>

                        <option value="Bills">
                            Bills
                        </option>

                        <option value="Shopping">
                            Shopping
                        </option>

                        <option value="Transport">
                            Transport
                        </option>

                        <option value="Healthcare">
                            Healthcare
                        </option>

                        <option value="Other">
                            Other
                        </option>

                    </select>

                </div>

            </div>

            <div class="form-group">

                <label>
                    Paid By
                </label>

                <select name="paid_by">

                    {% for member in members %}

                    <option value="{{ member.id }}">

                        {{ member.full_name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="form-group">

                <label>
                    Description
                </label>

                <textarea
                    name="description"
                    rows="4"
                    placeholder="Enter expense description">
                </textarea>

            </div>

            <div class="task-actions">

                <a
                    href="{{ url_for('expenses.expense_list') }}"
                    class="cancel-btn">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="create-btn">

                    Create Expense

                </button>

            </div>

        </div>

    </form>

</div>

{% endblock %}
